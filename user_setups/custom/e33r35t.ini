;***************************************************;
;   E33R35T ESP32 module (3.5" 320x480)             ;
;               - ST7796U TFT SPI 4-WIRE            ;
;               - XPT2046 touch controller          ;
;               - shared HSPI bus (GPIO 12/13/14)   ;
;***************************************************;

[env:e33r35t_4MB]
extends = arduino_esp32_v2, flash_4mb
board = esp32dev

build_flags =
    ${arduino_esp32_v2.build_flags}
    ${esp32.no_ps_ram}

;region -- TFT_eSPI build options ------------------------
    ${esp32.hspi}        ; GPIO 12=MISO, 13=MOSI, 14=SCLK
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1
    -D TFT_ROTATION=0    ; 0=0, 1=90, 2=180 or 3=270 degree
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1        ; shared reset with ESP32 EN
    -D TFT_BCKL=27
    -D SUPPORT_TRANSACTIONS
    -D SPI_FREQUENCY=65000000
    -D SPI_READ_FREQUENCY=20000000
    -D TOUCH_CS=33
    -D TOUCH_DRIVER=0x2046 ; XPT2046 Resistive SPI touch panel driver
    -D HASP_USE_LGFX_TOUCH=1
    -D TOUCH_SDA=-1
    -D TOUCH_SCL=-1
    -D TOUCH_IRQ=36
    -D I2C_TOUCH_PORT=0
    -D I2C_TOUCH_ADDRESS=0
    -D I2C_TOUCH_FREQUENCY=0
    -D SPI_TOUCH_FREQUENCY=2500000
;endregion

lib_deps =
    ${arduino_esp32_v2.lib_deps}
    ${tft_espi.lib_deps}
